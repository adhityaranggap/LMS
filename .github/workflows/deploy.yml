name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native addons for tests
        run: npm rebuild better-sqlite3

      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Backup database before deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          script: |
            APP_DIR="/root/biulms"
            mkdir -p "$APP_DIR/data/backups"
            if [ -f "$APP_DIR/data/data.db" ]; then
              cp "$APP_DIR/data/data.db" "$APP_DIR/data/backups/pre-deploy-$(date +%Y%m%d-%H%M%S).db"
              echo ">> Database backup created"
            fi

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 300s
          envs: REPO
          script: |
            set -e

            APP_DIR="/root/biulms"

            # Clone repo if not exists, else pull latest
            if [ ! -d "$APP_DIR/.git" ]; then
              echo ">> Cloning repository..."
              git clone "https://github.com/${REPO}.git" "$APP_DIR"
            else
              echo ">> Pulling latest code..."
              cd "$APP_DIR"
              git fetch origin
              git checkout main
              git pull --ff-only origin main
            fi

            cd "$APP_DIR"

            # .env.local must exist on server (created once via setup script)
            if [ ! -f ".env.local" ]; then
              echo "ERROR: .env.local not found! Run setup-server.sh first."
              exit 1
            fi

            # Ensure data directory exists (SQLite persistence)
            mkdir -p data

            # Build and restart containers
            echo ">> Building Docker images..."
            docker compose -f docker-compose.prod.yml build --no-cache

            echo ">> Starting services..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Poll until app is healthy (max 90s)
            echo ">> Waiting for app to be healthy..."
            for i in $(seq 1 18); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' biulms 2>/dev/null || echo "starting")
              echo "   Health: $STATUS (attempt $i/18)"
              if [ "$STATUS" = "healthy" ]; then
                break
              fi
              sleep 5
            done

            # Check final health status
            FINAL_STATUS=$(docker inspect --format='{{.State.Health.Status}}' biulms 2>/dev/null || echo "unknown")
            if [ "$FINAL_STATUS" != "healthy" ]; then
              echo "WARNING: App is not healthy after deploy! Status: $FINAL_STATUS"
              echo ">> Container logs:"
              docker logs biulms --tail 50
            fi

            echo ">> Service status:"
            docker compose -f docker-compose.prod.yml ps

            # Recreate biulms-ssl nginx (its --link to biulms breaks after biulms is recreated)
            echo ">> Recreating nginx SSL proxy..."
            docker rm -f biulms-ssl || true
            # Ensure nginx-ssl.conf is a file (Docker can accidentally create it as a dir)
            [ -d /root/biulms/nginx-ssl.conf ] && rmdir /root/biulms/nginx-ssl.conf || true
            # Keep the deployed nginx-ssl.conf in sync with the repo
            cp "$APP_DIR/nginx-ssl.conf" /root/biulms/nginx-ssl.conf 2>/dev/null || true
            docker run -d --name biulms-ssl \
              --link biulms:biulms \
              --restart unless-stopped \
              -p 80:80 -p 443:443 \
              -v /root/biulms/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro \
              -v /etc/letsencrypt:/etc/letsencrypt:ro \
              -v /var/www:/var/www:ro \
              nginx:alpine

            echo ">> Deployment complete! https://biu.lingkunganplus.com"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 120s
          script: |
            echo ">> Deployment failed! Attempting rollback..."
            cd /root/biulms
            LATEST_BACKUP=$(ls -t data/backups/pre-deploy-*.db 2>/dev/null | head -1)
            if [ -n "$LATEST_BACKUP" ]; then
              echo ">> Restoring database from $LATEST_BACKUP"
              cp "$LATEST_BACKUP" data/data.db
            fi
            git checkout HEAD~1
            docker compose -f docker-compose.prod.yml up -d --build
            echo ">> Rollback complete"
