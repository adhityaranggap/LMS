services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    container_name: biulms
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - SERVER_PORT=8007
      - ALLOWED_ORIGIN=https://biu.lingkunganplus.com
      - LAB_MAX_CONCURRENT=25
    ports:
      - "8007:8007"
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "999"
    network_mode: bridge
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:8007/api/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
